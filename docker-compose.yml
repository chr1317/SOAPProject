services:
  db:
    image: mariadb:10.4
    container_name: soap_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: soap_currency_exchange
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./Backend
    container_name: soap_backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      DB_URL: jdbc:mysql://db:3306/soap_currency_exchange?useSSL=false&serverTimezone=UTC
      DB_USER: root
      DB_PASSWORD: root

volumes:
  db_data: